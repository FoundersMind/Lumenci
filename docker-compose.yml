services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_SECRET_KEY: "change-me-in-prod"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
    restart: unless-stopped

